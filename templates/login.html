<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Connexion</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f8;
        }

        .box{

            width:350px;

            margin:100px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            text-align:center;
        }

        input{

            width:100%;

            padding:10px;

            margin-bottom:15px;
        }

        button{

            width:100%;

            padding:10px;

            background:#27ae60;

            color:white;

            border:none;

            border-radius:5px;
        }

        .error{

            color:red;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🔐 Connexion</h1>

    {% if error %}

        <p class="error">{{ error }}</p>

    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Se connecter

        </button>

    </form>

</div>

</body>
</html>
