<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WhatsApp</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg p-4">

            <h1 class="text-center text-success mb-4">
                💬 Envoyer WhatsApp
            </h1>

            <form method="POST">

                <!-- PHONE -->

                <div class="mb-3">

                    <label class="form-label">
                        Numéro Téléphone
                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ contact['telephone'] }}"
                        required
                    >

                </div>

                <!-- MESSAGE -->

                <div class="mb-3">

                    <label class="form-label">
                        Message
                    </label>

                    <textarea
                        name="message"
                        rows="8"
                        class="form-control"
                    >
Bonjour {{ contact['nom'] }},

Nous vous confirmons votre rendez-vous.

Merci de votre confiance.

Cordialement,
Meryem Hachami Alaoui
                    </textarea>

                </div>

                <!-- BUTTONS -->

                <div class="d-flex justify-content-between">

                    <a
                        href="/"
                        class="btn btn-secondary"
                    >
                        Retour
                    </a>

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Envoyer
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
