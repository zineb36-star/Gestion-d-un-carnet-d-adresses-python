<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Ajouter Contact</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg p-4">

            <h1 class="text-center text-primary mb-4">
                ➕ Ajouter Contact
            </h1>

            <form method="POST">

                <!-- NOM -->

                <div class="mb-3">

                    <label class="form-label">
                        Nom
                    </label>

                    <input
                        type="text"
                        name="nom"
                        class="form-control"
                        placeholder="Nom"
                        required
                    >

                </div>

                <!-- EMAIL -->

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Email"
                        required
                    >

                </div>

                <!-- TELEPHONE -->

                <div class="mb-3">

                    <label class="form-label">
                        Téléphone
                    </label>

                    <input
                        type="text"
                        name="telephone"
                        class="form-control"
                        placeholder="Téléphone"
                        required
                    >

                </div>

                <!-- CATEGORIE -->

                <div class="mb-3">

                    <label class="form-label">
                        Catégorie
                    </label>

                    <select
                        name="categorie"
                        class="form-select"
                    >

                        <option>Client</option>

                        <option>Fournisseur</option>

                        <option>Patient</option>

                        <option>Laboratoire</option>

                    </select>

                </div>

                <!-- ADRESSE -->

                <div class="mb-3">

                    <label class="form-label">
                        Adresse
                    </label>

                    <input
                        type="text"
                        name="adresse"
                        class="form-control"
                        placeholder="Adresse"
                    >

                </div>

                <!-- FONCTION -->

                <div class="mb-3">

                    <label class="form-label">
                        Fonction
                    </label>

                    <input
                        type="text"
                        name="fonction"
                        class="form-control"
                        placeholder="Fonction"
                    >

                </div>

                <!-- ENTREPRISE -->

                <div class="mb-3">

                    <label class="form-label">
                        Entreprise
                    </label>

                    <input
                        type="text"
                        name="entreprise"
                        class="form-control"
                        placeholder="Entreprise"
                    >

                </div>

                <!-- BUTTONS -->

                <div class="d-flex justify-content-between">

                    <a
                        href="/"
                        class="btn btn-secondary"
                    >
                        Retour
                    </a>

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Ajouter
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
